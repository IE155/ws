<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>赛车小游戏</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="gameContainer">
        <div id="gameHeader">
            <h1>🏎️ 赛车小游戏</h1>
            <div id="score">得分: <span id="scoreValue">0</span></div>
        </div>
        <div id="gameArea">
            <canvas id="gameCanvas"></canvas>
            
            <!-- 摇杆容器 -->
            <div id="joystickContainer">
                <div id="joystickBase">
                    <div id="joystickKnob"></div>
                    <span class="dot dot-top"></span>
                    <span class="dot dot-bottom"></span>
                    <span class="dot dot-left"></span>
                    <span class="dot dot-right"></span>
                </div>
            </div>
            
            <!-- 开始界面 - 提高点击穿透 -->
            <div id="startScreen">
                <div id="startContent">
                    <h2>🏁 准备出发</h2>
                    <div id="lifeSelector">
                        <label for="lifeCount">选择生命值 (1-10):</label>
                        <div id="lifeControls">
                            <button id="lifeMinus">−</button>
                            <span id="lifeDisplay">3</span>
                            <button id="lifePlus">+</button>
                        </div>
                        <div id="lifePresets">
                            <button class="presetBtn" data-value="1">1</button>
                            <button class="presetBtn" data-value="3">3</button>
                            <button class="presetBtn" data-value="5">5</button>
                            <button class="presetBtn" data-value="10">10</button>
                        </div>
                    </div>
                    <button id="startBtn">🚗 开始游戏</button>
                    <p id="controlsHint">🎮 拖动摇杆 或 键盘方向键控制</p>
                </div>
            </div>
            
            <!-- 游戏结束界面 -->
            <div id="gameOver">
                <h2>💥 游戏结束</h2>
                <p>最终得分: <span id="finalScore">0</span></p>
                <button id="restartBtn">🔄 重新开始</button>
            </div>
        </div>
        <div id="controls">
            <p>🎮 拖动摇杆 或 键盘 ⬆️⬇️⬅️➡️ 控制赛车</p>
            <p style="font-size:12px; color:rgba(255,255,255,0.3);">WASD 也可控制</p>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
